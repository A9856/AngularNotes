<!-- array.splice(startIndex, deleteCount) -->
 <!DOCTYPE html>
<html>
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body>

<div ng-app="" ng-init="arr=[10,20,30,40,50]">

    <p>Removed Elements: {{arr.splice(1,2)}}</p>
    <p>2 index start 0 element delete 100 insert:  arr.splice(2,0,100)</p>
    <p>2 index start 1 element remove 100 insert arr.splice(2,1,100)</p>
    <!-- slice not change original array but splice change original array -->
</div>
</body>
</html>
